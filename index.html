    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              space: '#0a0b10',
              neon: '#00f2ff',
              alert: '#ff8c00',
              glass: 'rgba(10, 11, 16, 0.8)'
            },
            fontFamily: {
              orbitron: ['"Orbitron"', 'sans-serif'],
              mono: ['"Share Tech Mono"', 'monospace'],
            },
            backgroundImage: {
              'grid-pattern': "linear-gradient(to right, #00f2ff1a 1px, transparent 1px), linear-gradient(to bottom, #00f2ff1a 1px, transparent 1px)",
            }
          }
        }

    <style>
      body {
        background-color: #0a0b10;
        color: #e0e0e0;
        font-family: 'Share Tech Mono', monospace;
      }
      .scanline {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
        background-size: 100% 4px;
        z-index: 50;
        pointer-events: none;
        opacity: 0.15;
      }
      .glow-text {
        text-shadow: 0 0 5px #00f2ff, 0 0 10px #00f2ff;
      }
      .glow-border {
        box-shadow: 0 0 5px #00f2ff, inset 0 0 5px #00f2ff;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0b10; 
      }
      ::-webkit-scrollbar-thumb {
        background: #00f2ff; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00c2cc; 
      }
    </style>
