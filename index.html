<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kepler-452b Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              space: '#0a0b10',
              neon: '#00f2ff',
              alert: '#ff8c00',
              glass: 'rgba(10, 11, 16, 0.8)',
              'panel-dark': '#0f1115',
              'panel-light': '#1a1d23'
            },
            fontFamily: {
              orbitron: ['"Chakra Petch"', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            backgroundImage: {
              'grid-pattern': "linear-gradient(to right, #00f2ff1a 1px, transparent 1px), linear-gradient(to bottom, #00f2ff1a 1px, transparent 1px)",
              'hex-pattern': "url('data:image/svg+xml,%3Csvg width=\"24\" height=\"40\" viewBox=\"0 0 24 40\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cpath d=\"M0 40c5.523 0 10-4.477 10-10V10c0-5.523-4.477-10-10-10s-10 4.477-10 10v20c0 5.523 4.477 10 10 10z\" fill=\"%231a1d23\" fill-opacity=\"0.1\" fill-rule=\"evenodd\"/%3E%3C/svg%3E')",
              'carbon': "radial-gradient(black 15%, transparent 16%) 0 0, radial-gradient(black 15%, transparent 16%) 8px 8px, radial-gradient(rgba(255,255,255,.1) 15%, transparent 20%) 0 1px, radial-gradient(rgba(255,255,255,.1) 15%, transparent 20%) 8px 9px",
            },
            boxShadow: {
              'neon-glow': '0 0 10px #00f2ff, 0 0 20px #00f2ff',
              'panel-inset': 'inset 0 0 20px rgba(0,0,0,0.8)',
              'btn-inner': 'inset 0 1px 0 rgba(255,255,255,0.1), 0 1px 3px rgba(0,0,0,0.5)'
            },
            animation: {
              'noise': 'noise 0.2s steps(3) infinite',
              'scan': 'scan 3s linear infinite',
            },
            keyframes: {
              noise: {
                '0%': { transform: 'translate(0, 0)' },
                '10%': { transform: 'translate(-5%, -5%)' },
                '20%': { transform: 'translate(-10%, 5%)' },
                '30%': { transform: 'translate(5%, -10%)' },
                '40%': { transform: 'translate(-5%, 15%)' },
                '50%': { transform: 'translate(-10%, 5%)' },
                '60%': { transform: 'translate(15%, 0)' },
                '70%': { transform: 'translate(0, 10%)' },
                '80%': { transform: 'translate(-15%, 0)' },
                '90%': { transform: 'translate(10%, 5%)' },
                '100%': { transform: 'translate(5%, 0)' },
              },
              scan: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(500%)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #050505;
        color: #e0e0e0;
        font-family: 'JetBrains Mono', monospace;
        overflow-x: hidden;
      }
      .bg-carbon {
        background-color: #111;
        background-image: 
          radial-gradient(black 15%, transparent 16%),
          radial-gradient(black 15%, transparent 16%);
        background-size: 16px 16px;
        background-position: 0 0, 8px 8px;
      }
      .scanline {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
        background-size: 100% 4px;
        z-index: 50;
        pointer-events: none;
        opacity: 0.3;
      }
      .panel-metal {
        background: linear-gradient(135deg, #1a1d23 0%, #0f1115 100%);
        border: 1px solid #333;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5);
      }
      .tech-btn {
        background: linear-gradient(to bottom, #2a2d35, #1a1d23);
        border: 1px solid #444;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 4px rgba(0,0,0,0.5);
      }
      .tech-btn:active {
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        transform: translateY(1px);
      }
      /* Noise Effect Class */
      .noise-bg {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.4'/%3E%3C/svg%3E");
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0b10; 
      }
      ::-webkit-scrollbar-thumb {
        background: #00f2ff; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00c2cc; 
      }
      
      /* Markdown Styles */
      .markdown-body {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.875rem; /* text-sm */
        line-height: 1.5;
      }
      .markdown-body p {
        margin-bottom: 0.5rem;
      }
      .markdown-body p:last-child {
        margin-bottom: 0;
      }
      .markdown-body strong {
        font-weight: 700;
        color: #fff;
      }
      .markdown-body em {
        font-style: italic;
      }
      .markdown-body code {
        background-color: rgba(255, 255, 255, 0.1);
        padding: 0.1rem 0.3rem;
        border-radius: 0.25rem;
        font-family: 'JetBrains Mono', monospace;
      }
      .markdown-body pre {
        background-color: rgba(0, 0, 0, 0.5);
        padding: 0.5rem;
        border-radius: 0.25rem;
        overflow-x: auto;
        margin-bottom: 0.5rem;
      }
      .markdown-body pre code {
        background-color: transparent;
        padding: 0;
      }
      .markdown-body ul {
        list-style-type: disc;
        padding-left: 1.5rem;
        margin-bottom: 0.5rem;
      }
      .markdown-body ol {
        list-style-type: decimal;
        padding-left: 1.5rem;
        margin-bottom: 0.5rem;
      }
      .markdown-body blockquote {
        border-left: 2px solid #00f2ff;
        padding-left: 0.5rem;
        margin-left: 0;
        color: #aaa;
      }
      .markdown-body a {
        color: #00f2ff;
        text-decoration: underline;
      }
      .markdown-body .katex {
        font-size: 1.1em;
      }
    </style>
